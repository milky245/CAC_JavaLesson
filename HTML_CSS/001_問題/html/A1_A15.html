<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HTML の演習課題</title>
</head>
<body>
    <h2>&lt;h2&gt;タグで作成した見出しです。</h2>
    <h3>&lt;h3&gt;タグで作成した見出しです。</h3>
    <p>これはただの&nbsp;テキスト&nbsp;です。</p>
    <p>これは&lt;p&gt;タグで
        <br>囲まれたテキストです。</p>
    <!--箇条書きリストを追加-->
    <ul>
        <li>1つ目の項目</li>
        <li>2つ目の項目</li>
        <li>3つ目の項目</li>
    </ul>
    <!--番号付きリストを追加-->
    <ol>
        <li>1つ目の項目</li>
        <li>2つ目の項目</li>
        <li>3つ目の項目</li>
    </ol>
</body>
</html>
