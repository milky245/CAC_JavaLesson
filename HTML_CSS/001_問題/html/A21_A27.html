<body>
    <!--作成したテーブルの外枠と内枠の線を表示して-->

    <!-- 第1行 -->
    <tr>
        <td colspan="3">水平方向の結合セル</td>
    </tr>

    <!-- 第2行 -->
    <tr>
        <td rowspan="2">垂直方向の結合セル</td>
        <td>2行2列目のセル</td>
        <td>2行3列目のセル</td>
    </tr>

    <!-- 第3行 -->

        <td>3行2列目のセル</td>

    </tr>
